# 左右通信の必須設定
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# macOSの相性問題（切断バグ）を回避するための設定
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24

# 【最重要】スリープと省電力モードを地球上から完全に消し去る
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_TIMEOUT=99999999

# 不要な機能のオフ
CONFIG_ZMK_DISPLAY=n
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_USB=n

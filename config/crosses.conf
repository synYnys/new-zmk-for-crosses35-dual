# 左右通信の必須設定
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# 電波出力を限界MAXの+8dBmに強化
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# macOSの相性問題（切断バグ）を回避するための設定
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24

# 【NEW】半分眠るまでの時間を30秒から「10分」に延ばす（Macのブチ切り対策）
CONFIG_ZMK_IDLE_TIMEOUT=600000

# スリープ設定（完全に爆睡するまでは1時間）
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# 不要な機能のオフ
CONFIG_ZMK_DISPLAY=n
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_USB=n
